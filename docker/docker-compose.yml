services:

  qdrant:
    image: qdrant/qdrant:v1.14.0
    container_name: mcp-qdrant
    restart: unless-stopped
    ports:
      - "127.0.0.1:6333:6333"
      - "127.0.0.1:6334:6334"
    environment:
      QDRANT__SERVICE__API_KEY: "${QDRANT_API_KEY}"
      QDRANT__SERVICE__READ_ONLY_API_KEY: "${QDRANT_READ_ONLY_API_KEY}"
      QDRANT__SERVICE__JWT_RBAC: "true"
      QDRANT__LOG_LEVEL: "INFO"
    volumes:
      - qdrant_storage:/qdrant/storage
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  ollama:
    image: ollama/ollama:latest
    container_name: mcp-ollama
    restart: unless-stopped
    ports:
      - "127.0.0.1:11434:11434"
    volumes:
      - ollama_models:/root/.ollama
    healthcheck:
      test: ["CMD", "kill", "-0", "1"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 30s

  ollama-model-pull:
    image: curlimages/curl:latest
    container_name: mcp-ollama-model-pull
    depends_on:
      ollama:
        condition: service_healthy
    restart: "no"
    entrypoint: >
      sh -c "
        echo 'Waiting for Ollama HTTP API...' &&
        until curl -sf http://ollama:11434/api/tags > /dev/null; do
          echo 'Not ready yet, retrying in 3s...' && sleep 3;
        done &&
        echo 'Pulling nomic-embed-text...' &&
        curl -sf http://ollama:11434/api/pull
          -H 'Content-Type: application/json'
          -d '{"name": "nomic-embed-text"}'
          --max-time 600 &&
        echo 'Done.'
      "

volumes:
  qdrant_storage:
    driver: local
  ollama_models:
    driver: local
