services:

  qdrant:
    image: qdrant/qdrant:v1.14.0
    container_name: mcp-qdrant
    restart: unless-stopped
    ports:
      - "127.0.0.1:6333:6333"
      - "127.0.0.1:6334:6334"
    environment:
      QDRANT__SERVICE__API_KEY: "${QDRANT_API_KEY}"
      QDRANT__SERVICE__READ_ONLY_API_KEY: "${QDRANT_READ_ONLY_API_KEY}"
      QDRANT__SERVICE__JWT_RBAC: "true"
      QDRANT__LOG_LEVEL: "INFO"
    volumes:
      - qdrant_storage:/qdrant/storage
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  ollama:
    build:
      context: .
      dockerfile: Dockerfile.ollama
    container_name: mcp-ollama
    restart: unless-stopped
    ports:
      - "127.0.0.1:11434:11434"
    volumes:
      - ollama_models:/root/.ollama
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 20s

  # One-shot sidecar that pulls the embedding model after Ollama is healthy.
  # Exits cleanly once the pull is done — won't re-pull on subsequent starts
  # because the model is cached in the ollama_models volume.
  ollama-model-pull:
    image: curlimages/curl:latest
    container_name: mcp-ollama-model-pull
    depends_on:
      ollama:
        condition: service_healthy
    restart: "no"
    entrypoint: >
      sh -c "
        echo 'Pulling nomic-embed-text embedding model...' &&
        curl -sf http://ollama:11434/api/pull
          -H 'Content-Type: application/json'
          -d '{"name": "nomic-embed-text"}'
          --max-time 600 &&
        echo 'Model pull complete.'
      "

volumes:
  qdrant_storage:
    driver: local
  ollama_models:
    driver: local
